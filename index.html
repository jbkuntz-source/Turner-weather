<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0e0c0a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Turner"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Turner · Weather</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0c0a;
      color: #e8dece;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Header */
    header {
      flex-shrink: 0;
      padding: 16px 22px 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .location-line {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6a5e4e;
      margin-bottom: 2px;
    }

    .date-line { font-size: 12px; color: #9a8a78; }
    .time-line { font-size: 20px; font-weight: 300; text-align: right; color: #e8dece; }
    .temp-line { font-size: 12px; color: #9a8a78; text-align: right; margin-top: 1px; }

    /* Weather summary bar */
    #weather-bar {
      flex-shrink: 0;
      padding: 6px 22px 10px;
      display: none;
      align-items: baseline;
      gap: 10px;
    }

    #weather-bar .condition {
      font-size: 14px;
      color: #c8b8a4;
    }

    #weather-bar .temp-big {
      font-size: 22px;
      font-weight: 300;
      color: #e8dece;
    }

    /* Painting area — always shows full painting */
    #painting-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      min-height: 200px;
      position: relative;
    }

    #painting-wrap {
      width: 100%;
      max-width: 700px;
      position: relative;
      display: none;
    }

    #painting-img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 1px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.6), 0 1px 8px rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #painting-img.loaded { opacity: 1; }

    #status-msg {
      color: #5a4e40;
      font-style: italic;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 20px;
    }

    /* Painting caption */
    #painting-caption {
      padding: 10px 4px 0;
      display: none;
    }

    #painting-title {
      font-size: 15px;
      font-style: italic;
      color: #e8dece;
      line-height: 1.3;
      margin-bottom: 2px;
    }

    #painting-year {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: #7a6e5e;
    }

    /* Footer */
    footer {
      flex-shrink: 0;
      padding: 12px 22px 18px;
      border-top: 1px solid #1e1a14;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      display: none;
    }

    .footer-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #5a4e40;
      margin-bottom: 3px;
    }

    .footer-value { font-size: 13px; color: #c8b8a4; }
    .footer-value.italic { font-style: italic; }

    .byline {
      margin-top: 8px;
      font-size: 9px;
      color: #2e2820;
      letter-spacing: 0.07em;
      text-align: center;
    }

    #refresh-btn {
      display: block;
      margin: 10px auto 0;
      background: none;
      border: 1px solid #2e2820;
      color: #5a4e40;
      font-family: Georgia, serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 18px;
      cursor: pointer;
      border-radius: 1px;
    }
    #refresh-btn:active { background: #1a1610; }

    /* Desktop: constrain width */
    @media (min-width: 600px) {
      body {
        max-width: 520px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="location-line" id="location-line">Locating…</div>
      <div class="date-line" id="date-line">—</div>
    </div>
    <div>
      <div class="time-line" id="time-line">—</div>
      <div class="temp-line" id="temp-line"></div>
    </div>
  </header>

  <div id="weather-bar">
    <span class="temp-big" id="temp-big"></span>
    <span class="condition" id="condition-val"></span>
  </div>

  <div id="painting-area">
    <span id="status-msg">Reading the sky…</span>
    <div id="painting-wrap">
      <img id="painting-img" alt="Turner painting"/>
      <div id="painting-caption">
        <div id="painting-title"></div>
        <div id="painting-year"></div>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-row" id="footer-data">
      <div>
        <div class="footer-label">Condition</div>
        <div class="footer-value" id="condition-footer">—</div>
      </div>
      <div style="text-align:right;">
        <div class="footer-label">Mood</div>
        <div class="footer-value italic" id="mood-val">—</div>
      </div>
    </div>
    <div class="byline">J. M. W. Turner · British, 1775–1851 · Public domain via Wikimedia</div>
    <button id="refresh-btn" onclick="nextPainting()">Another painting</button>
  </footer>

  <script>
  // ── Painting library (26 paintings) ─────────────────────────────────────
  const PAINTINGS = [
    // SUNNY / CLEAR DAY (7)
    { file:"Joseph_Mallord_William_Turner_-_Norham_Castle,_Sunrise_-_WGA23182.jpg", title:"Norham Castle, Sunrise", year:"c. 1845", mood:"luminous", group:"sunny" },
    { file:"The_Fighting_Temeraire,_JMW_Turner,_National_Gallery.jpg", title:"The Fighting Temeraire", year:"1839", mood:"golden", group:"sunny" },
    { file:"Turner_-_Ulysses_deriding_Polyphemus_-_National_Gallery_file.jpg", title:"Ulysses Deriding Polyphemus", year:"1829", mood:"radiant", group:"sunny" },
    { file:"Joseph_Mallord_William_Turner_-_Chichester_Canal_-_Google_Art_Project.jpg", title:"Chichester Canal", year:"c. 1828", mood:"serene", group:"sunny" },
    { file:"Turner_-_Lake_Avernus-_Aeneas_and_the_Cumaean_Sibyl_-_Yale.jpg", title:"Lake Avernus: Aeneas and the Cumaean Sibyl", year:"c. 1814–15", mood:"gilded", group:"sunny" },
    { file:"JMW_Turner_-_Dido_building_Carthage.jpg", title:"Dido Building Carthage", year:"1815", mood:"triumphant", group:"sunny" },
    { file:"Joseph_Mallord_William_Turner_-_The_Lake,_Petworth,_Sunset;_Fighting_Bucks_-_Google_Art_Project.jpg", title:"The Lake, Petworth: Sunset", year:"c. 1829", mood:"warm", group:"sunny" },

    // PARTLY CLOUDY (5)
    { file:"Joseph_Mallord_William_Turner_-_Venice,_from_the_Porch_of_Madonna_della_Salute_-_WGA23197.jpg", title:"Venice, from the Porch of Madonna della Salute", year:"1835", mood:"hazy", group:"partly_cloudy" },
    { file:"William_Turner_-_Rain,_Steam_and_Speed_-_The_Great_Western_Railway.jpg", title:"Rain, Steam and Speed", year:"1844", mood:"charging", group:"partly_cloudy" },
    { file:"Joseph_Mallord_William_Turner_-_Rotterdam_Ferry-Boat_-_WGA23183.jpg", title:"Rotterdam Ferry-Boat", year:"1833", mood:"breezy", group:"partly_cloudy" },
    { file:"Joseph_Mallord_William_Turner_-_Keelmen_Heaving_in_Coals_by_Moonlight_-_WGA23178.jpg", title:"Keelmen Heaving in Coals by Moonlight", year:"1835", mood:"industrial", group:"partly_cloudy" },
    { file:"J.M.W.Turner_-_The_Grand_Canal_-_Venice_(Metmuseum).jpg", title:"The Grand Canal, Venice", year:"1835", mood:"shimmering", group:"partly_cloudy" },

    // OVERCAST / FOG (4)
    { file:"Joseph_Mallord_William_Turner_-_'The_Sun_Rising_through_Vapour'_-_Google_Art_Project.jpg", title:"The Sun Rising through Vapour", year:"c. 1809", mood:"vaporous", group:"overcast" },
    { file:"Joseph_Mallord_William_Turner_-_Venice_from_the_Lagoon_at_Sunset_-_WGA23200.jpg", title:"Venice from the Lagoon at Sunset", year:"c. 1840", mood:"dissolving", group:"overcast" },
    { file:"Joseph_Mallord_William_Turner_-_Staffa,_Fingal's_Cave_-_Google_Art_Project.jpg", title:"Staffa, Fingal's Cave", year:"1832", mood:"brooding", group:"overcast" },
    { file:"Joseph_Mallord_William_Turner_-_The_Harbours_of_England_-_WGA23174.jpg", title:"Dover Castle", year:"c. 1822", mood:"heavy", group:"overcast" },

    // RAIN (3)
    { file:"Joseph_Mallord_William_Turner_-_Buttermere_Lake,_with_Part_of_Cromackwater,_Cumberland,_a_Shower_-_WGA23140.jpg", title:"Buttermere Lake, a Shower", year:"1798", mood:"melancholic", group:"rain" },
    { file:"Joseph_Mallord_William_Turner_-_Dunstanburgh_Castle_-_Google_Art_Project.jpg", title:"Dunstanburgh Castle", year:"1798", mood:"foreboding", group:"rain" },
    { file:"Turner_-_Fishermen_at_Sea.jpg", title:"Fishermen at Sea", year:"1796", mood:"perilous", group:"rain" },

    // STORM (3)
    { file:"Joseph_Mallord_William_Turner_-_Snow_Storm_-_Steam-Boat_off_a_Harbour's_Mouth_-_WGA23178.jpg", title:"Snow Storm: Steam-Boat off a Harbour's Mouth", year:"1842", mood:"tempestuous", group:"storm" },
    { file:"Joseph_Mallord_William_Turner_-_The_Slave_Ship_-_WGA23178.jpg", title:"The Slave Ship", year:"1840", mood:"violent", group:"storm" },
    { file:"Joseph_Mallord_William_Turner_-_Valley_of_Aosta-_Snowstorm,_Avalanche_and_Thunderstorm_-_1836-7_-_Art_Institute_Chicago.jpg", title:"Valley of Aosta: Snowstorm, Avalanche and Thunderstorm", year:"1836–37", mood:"elemental", group:"storm" },

    // SNOW (2)
    { file:"JMW_Turner_-_Frosty_Morning.jpg", title:"Frosty Morning", year:"1813", mood:"hushed", group:"snow" },
    { file:"Joseph_Mallord_William_Turner_-_Newark_Abbey_on_the_Wey.jpg", title:"Newark Abbey on the Wey", year:"c. 1807", mood:"wintry", group:"snow" },

    // NIGHT (2)
    { file:"Joseph_Mallord_William_Turner_-_Moonlight,_a_Study_at_Millbank_-_WGA23135.jpg", title:"Moonlight, a Study at Millbank", year:"1797", mood:"nocturnal", group:"night" },
    { file:"Joseph_Mallord_William_Turner_-_Keelmen_Heaving_in_Coals_by_Moonlight_-_WGA23178.jpg", title:"Keelmen Heaving in Coals by Moonlight", year:"1835", mood:"nocturnal", group:"night" },
  ];

  function wikiImg(filename, width) {
    const encoded = encodeURIComponent(filename.replace(/ /g, '_'));
    return `https://en.wikipedia.org/w/index.php?title=Special:Redirect/file/${encoded}&width=${width}`;
  }

  const WMO = {
    0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",
    45:"Fog",48:"Freezing fog",51:"Light drizzle",53:"Moderate drizzle",55:"Dense drizzle",
    61:"Slight rain",63:"Moderate rain",65:"Heavy rain",
    71:"Slight snow",73:"Moderate snow",75:"Heavy snow",77:"Snow grains",
    80:"Slight showers",81:"Moderate showers",82:"Heavy showers",
    85:"Snow showers",86:"Heavy snow showers",
    95:"Thunderstorm",96:"Thunderstorm w/ hail",99:"Thunderstorm w/ heavy hail"
  };

  function getGroup(code, isDay) {
    if (!isDay) return "night";
    if (code === 0) return "sunny";
    if (code <= 2)  return "partly_cloudy";
    if (code === 3) return "overcast";
    if (code <= 49) return "overcast";
    if (code <= 57) return "rain";
    if (code <= 67) return "rain";
    if (code <= 77) return "snow";
    if (code <= 82) return "rain";
    if (code <= 86) return "snow";
    if (code <= 99) return "storm";
    return "overcast";
  }

  // State
  let currentGroup = "sunny";
  let groupPaintings = [];
  let currentIndex = 0;
  let triedIndices = new Set();

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('time-line').textContent =
      now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    document.getElementById('date-line').textContent =
      now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  }

  // Show painting
  function showPainting(painting) {
    const img = document.getElementById('painting-img');
    const wrap = document.getElementById('painting-wrap');
    const caption = document.getElementById('painting-caption');

    img.classList.remove('loaded');

    document.getElementById('painting-title').textContent = painting.title;
    document.getElementById('painting-year').textContent = `J. M. W. Turner  ·  ${painting.year}`;
    document.getElementById('mood-val').textContent = painting.mood;

    img.onload = () => {
      document.getElementById('status-msg').style.display = 'none';
      wrap.style.display = 'block';
      caption.style.display = 'block';
      document.getElementById('footer-data').style.display = 'flex';
      requestAnimationFrame(() => img.classList.add('loaded'));
    };

    img.onerror = () => {
      triedIndices.add(currentIndex);
      // Find an untried painting in the group
      let found = false;
      for (let i = 0; i < groupPaintings.length; i++) {
        if (!triedIndices.has(i)) {
          currentIndex = i;
          found = true;
          break;
        }
      }
      if (found) {
        showPainting(groupPaintings[currentIndex]);
      } else {
        document.getElementById('status-msg').textContent = 'Paintings unavailable';
        document.getElementById('status-msg').style.display = 'block';
      }
    };

    img.src = wikiImg(painting.file, 1200);
  }

  function nextPainting() {
    if (groupPaintings.length <= 1) return;
    triedIndices.clear();
    currentIndex = (currentIndex + 1) % groupPaintings.length;
    const img = document.getElementById('painting-img');
    img.classList.remove('loaded');
    showPainting(groupPaintings[currentIndex]);
  }

  // Reverse geocode lat/lon to city name
  async function getCityName(lat, lon) {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m&timezone=auto`;
      const res = await fetch(url);
      const data = await res.json();
      // Open-Meteo doesn't return city name, so use the timezone as a rough label
      const tz = data.timezone || '';
      // Extract city from timezone like "America/New_York"
      const city = tz.split('/').pop().replace(/_/g, ' ');
      return city || `${lat.toFixed(1)}°, ${lon.toFixed(1)}°`;
    } catch(e) {
      return `${lat.toFixed(1)}°, ${lon.toFixed(1)}°`;
    }
  }

  // Reverse geocode with Nominatim (free, no API key)
  async function reverseGeocode(lat, lon) {
    try {
      const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`;
      const res = await fetch(url);
      const data = await res.json();
      const addr = data.address || {};
      const city = addr.city || addr.town || addr.village || addr.county || '';
      const state = addr.state || '';
      const country = addr.country_code ? addr.country_code.toUpperCase() : '';
      if (city && state) return `${city}, ${state}`;
      if (city && country) return `${city}, ${country}`;
      if (city) return city;
      return `${lat.toFixed(1)}°, ${lon.toFixed(1)}°`;
    } catch(e) {
      return `${lat.toFixed(1)}°, ${lon.toFixed(1)}°`;
    }
  }

  // Main
  async function init() {
    updateClock();
    setInterval(updateClock, 30000);

    document.getElementById('status-msg').style.display = 'block';
    document.getElementById('status-msg').textContent = 'Reading the sky…';
    document.getElementById('painting-wrap').style.display = 'none';
    document.getElementById('painting-caption').style.display = 'none';

    // Get location
    let lat = 40.4406, lon = -79.9959; // Pittsburgh fallback
    let locationName = 'Pittsburgh, PA';

    try {
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: false,
          timeout: 8000,
          maximumAge: 600000 // cache location for 10 minutes
        });
      });
      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
      locationName = await reverseGeocode(lat, lon);
    } catch(e) {
      // Geolocation denied or unavailable — use Pittsburgh
    }

    document.getElementById('location-line').textContent = locationName;

    // Fetch weather
    let code = 0, isDay = true, tempC = 18;

    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,weather_code,is_day&temperature_unit=celsius&timezone=auto`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error();
      const data = await res.json();
      const c = data.current;
      code = c.weather_code;
      isDay = c.is_day === 1;
      tempC = c.temperature_2m;
      const tempF = Math.round(tempC * 9/5 + 32);

      document.getElementById('temp-line').textContent = `${tempF}°F · ${Math.round(tempC)}°C`;
      document.getElementById('temp-big').textContent = `${tempF}°`;
      document.getElementById('condition-val').textContent = WMO[code] || `Code ${code}`;
      document.getElementById('condition-footer').textContent = WMO[code] || `Code ${code}`;
      document.getElementById('weather-bar').style.display = 'flex';
    } catch(e) {
      document.getElementById('condition-footer').textContent = '—';
    }

    // Pick paintings
    currentGroup = getGroup(code, isDay);
    groupPaintings = PAINTINGS.filter(p => p.group === currentGroup);
    groupPaintings.sort(() => Math.random() - 0.5);
    currentIndex = 0;
    triedIndices.clear();

    showPainting(groupPaintings[currentIndex]);
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      Promise.all(regs.map(r => r.unregister())).then(() => {
        navigator.serviceWorker.register('sw.js');
      });
    });
  }

  init();
  </script>
</body>
</html>
